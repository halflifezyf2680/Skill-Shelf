<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 1000" width="540" height="1000">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>

  <!-- Frame -->
  <rect width="540" height="1000" rx="28" fill="#FAF9F6" stroke="#2D2D2D" stroke-width="4"/>

  <!-- Title -->
  <text x="270" y="48" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#1E2A3A" text-anchor="middle">🗂️ 自动分类与搜索</text>
  <text x="270" y="76" font-family="system-ui,sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">加权匹配 · 双语索引 · 热重载</text>

  <!-- Classification flow card (includes weighted matching) -->
  <rect x="24" y="100" width="492" height="410" rx="20" fill="#2D3748" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="48" y="132" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#FFF">🔄 分类流程</text>

  <!-- Weighted matching priority -->
  <text x="270" y="168" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" text-anchor="middle">
    <tspan font-weight="700" fill="#8BBAD8">keywords (4x)</tspan>
    <tspan fill="#FFF" fill-opacity="0.75"> &gt; </tspan>
    <tspan font-weight="700" fill="#7CC4A5">aliases (3x)</tspan>
    <tspan fill="#FFF" fill-opacity="0.75"> &gt; </tspan>
    <tspan font-weight="700" fill="#A99BCE">groupId (2x)</tspan>
    <tspan fill="#FFF" fill-opacity="0.75"> &gt; </tspan>
    <tspan font-weight="700" fill="#D4B86A">desc (1x)</tspan>
  </text>
  <text x="270" y="190" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.75" text-anchor="middle">加权匹配优先级 → 精准路由到目标组</text>

  <!-- Separator -->
  <line x1="48" y1="206" x2="496" y2="206" stroke="#FFF" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Node 1: 新技能 -->
  <circle cx="156" cy="248" r="22" fill="#FFF" fill-opacity="0.18" stroke="#FFF" stroke-width="1.5"/>
  <text x="156" y="253" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="600">新技能</text>
  <text x="196" y="253" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.85">安装新技能包</text>
  <line x1="156" y1="270" x2="156" y2="288" stroke="#4A7FB0" stroke-width="3"/>
  <polygon points="149,284 156,298 163,284" fill="#4A7FB0"/>

  <!-- Node 2: 提取 -->
  <circle cx="156" cy="320" r="22" fill="#4A7FB0"/>
  <text x="156" y="325" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="600">提取</text>
  <text x="196" y="325" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.85">提取 keywords / aliases</text>
  <line x1="156" y1="342" x2="156" y2="360" stroke="#3A9B7A" stroke-width="3"/>
  <polygon points="149,356 156,370 163,356" fill="#3A9B7A"/>

  <!-- Node 3: 匹配 -->
  <circle cx="156" cy="392" r="22" fill="#3A9B7A"/>
  <text x="156" y="397" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="600">匹配</text>
  <text x="196" y="397" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.85">加权匹配已有组</text>

  <!-- Success path (straight down) -->
  <line x1="156" y1="414" x2="156" y2="462" stroke="#FFF" stroke-width="2.5"/>
  <polygon points="150,458 156,472 162,458" fill="#FFF"/>
  <rect x="116" y="474" width="80" height="28" rx="14" fill="#3A9B7A"/>
  <text x="156" y="492" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="600">分配到组</text>

  <!-- Fallback branch (fork from success arrow, go right) -->
  <line x1="156" y1="438" x2="340" y2="438" stroke="#C27D3C" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="248" y="430" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" fill-opacity="0.8">无法匹配</text>
  <rect x="340" y="424" width="152" height="28" rx="14" fill="#C27D3C"/>
  <text x="416" y="442" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="600">specialized-domain</text>

  <!-- Dual feature cards -->
  <rect x="24" y="534" width="236" height="92" rx="18" fill="#3B6FA0" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="48" y="568" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#FFF">🌐 双语搜索</text>
  <text x="48" y="590" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">中英双语关键词索引</text>
  <text x="48" y="610" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.8">支持中英文混合搜索</text>

  <rect x="280" y="534" width="236" height="92" rx="18" fill="#2E8B6E" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="304" y="568" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#FFF">🔥 热重载</text>
  <text x="304" y="590" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">chokidar 监听文件变更</text>
  <text x="304" y="610" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.8">自动重建索引，无需重启</text>

  <!-- 16 groups card -->
  <rect x="24" y="650" width="492" height="290" rx="20" fill="#2D3748" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="48" y="682" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#FFF">📂 16 个技能组</text>
  <line x1="270" y1="696" x2="270" y2="902" stroke="#FFF" stroke-opacity="0.12" stroke-width="1.5"/>

  <text x="48" y="722" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">engineering</text>
  <text x="48" y="748" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">design</text>
  <text x="48" y="774" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">product</text>
  <text x="48" y="800" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">project-management</text>
  <text x="48" y="826" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">marketing</text>
  <text x="48" y="852" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">paid-media</text>
  <text x="48" y="878" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">sales</text>
  <text x="48" y="904" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">finance</text>

  <text x="292" y="722" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">legal-compliance</text>
  <text x="292" y="748" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">hr-talent</text>
  <text x="292" y="774" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">support-operations</text>
  <text x="292" y="800" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">supply-chain</text>
  <text x="292" y="826" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">academic-research</text>
  <text x="292" y="852" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">testing-qa</text>
  <text x="292" y="878" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF">spatial-gaming</text>

  <!-- Specialized domain -->
  <rect x="284" y="896" width="196" height="28" rx="8" fill="#C27D3C"/>
  <text x="292" y="914" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#FFF" font-weight="700">specialized-domain</text>

  <!-- Watermark -->
  <text x="270" y="986" font-family="system-ui,sans-serif" font-size="11" fill="#C4C4C4" text-anchor="middle">Skill Hub</text>
</svg>
