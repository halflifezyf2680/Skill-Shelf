<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="540" height="960">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>

  <!-- Frame -->
  <rect width="540" height="960" rx="28" fill="#FAF9F6" stroke="#2D2D2D" stroke-width="4"/>

  <!-- Title -->
  <text x="270" y="48" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#1E2A3A" text-anchor="middle">🛠️ 工具清单</text>
  <text x="270" y="76" font-family="system-ui,sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">9 个 MCP 工具，三种角色</text>

  <!-- Group 1: Routing (blue) -->
  <rect x="24" y="100" width="492" height="210" rx="20" fill="#3B6FA0" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="270" y="130" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#FFF" text-anchor="middle">🔀 路由 · 只读（4 个）</text>

  <text x="48" y="172" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" fill="#FFF">search_skills</text>
  <text x="228" y="172" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">按关键词搜索匹配组与技能</text>
  <line x1="48" y1="186" x2="496" y2="186" stroke="#FFF" stroke-opacity="0.18" stroke-width="1.5"/>
  <text x="48" y="210" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" fill="#FFF">list_skill_groups</text>
  <text x="228" y="210" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">列出所有顶级技能组</text>
  <line x1="48" y1="224" x2="496" y2="224" stroke="#FFF" stroke-opacity="0.18" stroke-width="1.5"/>
  <text x="48" y="248" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" fill="#FFF">list_group_skills</text>
  <text x="228" y="248" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">列出指定组内所有技能</text>
  <line x1="48" y1="262" x2="496" y2="262" stroke="#FFF" stroke-opacity="0.18" stroke-width="1.5"/>
  <text x="48" y="286" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" fill="#FFF">read_skill</text>
  <text x="228" y="286" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">读取完整技能正文</text>

  <!-- Group 2: Management (green) -->
  <rect x="24" y="330" width="492" height="136" rx="20" fill="#2E8B6E" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="270" y="360" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#FFF" text-anchor="middle">📋 管理 · 只读（2 个）</text>

  <text x="48" y="402" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" fill="#FFF">validate_skills</text>
  <text x="228" y="402" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">校验技能包完整性</text>
  <line x1="48" y1="416" x2="496" y2="416" stroke="#FFF" stroke-opacity="0.18" stroke-width="1.5"/>
  <text x="48" y="440" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" fill="#FFF">get_hub_status</text>
  <text x="228" y="440" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">获取 Hub 状态与索引信息</text>

  <!-- Group 3: Write (orange) -->
  <rect x="24" y="486" width="492" height="170" rx="20" fill="#C27D3C" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="270" y="516" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#FFF" text-anchor="middle">✏️ 写操作（3 个）</text>

  <text x="48" y="558" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" fill="#FFF">install_skills</text>
  <text x="228" y="558" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">安装技能包到 Hub</text>
  <line x1="48" y1="572" x2="496" y2="572" stroke="#FFF" stroke-opacity="0.18" stroke-width="1.5"/>
  <text x="48" y="596" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" fill="#FFF">create_skill</text>
  <text x="228" y="596" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">创建新技能包</text>
  <line x1="48" y1="610" x2="496" y2="610" stroke="#FFF" stroke-opacity="0.18" stroke-width="1.5"/>
  <text x="48" y="634" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" font-weight="600" fill="#FFF">manage_group</text>
  <text x="228" y="634" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">管理技能组（创建/更新/删除）</text>

  <!-- Design principles -->
  <rect x="24" y="676" width="492" height="160" rx="20" fill="#2D3748" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="48" y="708" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#FFF">🎯 设计原则</text>

  <rect x="48" y="726" width="104" height="32" rx="10" fill="#3B6FA0"/>
  <text x="100" y="746" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="700">规格化</text>
  <rect x="164" y="726" width="104" height="32" rx="10" fill="#2E8B6E"/>
  <text x="216" y="746" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="700">零开销</text>
  <rect x="280" y="726" width="104" height="32" rx="10" fill="#C27D3C"/>
  <text x="332" y="746" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="700">读写分离</text>
  <rect x="396" y="726" width="104" height="32" rx="10" fill="#6B5B95"/>
  <text x="448" y="746" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="700">热重载</text>

  <text x="48" y="798" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.8">只读工具可安全并发 · 写操作自动更新索引</text>

  <!-- Watermark -->
  <text x="270" y="936" font-family="system-ui,sans-serif" font-size="11" fill="#C4C4C4" text-anchor="middle">Skill Hub</text>
</svg>
