<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="640" height="1138">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.07"/></filter>
    <filter id="shCard"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <!-- Frame -->
  <rect width="540" height="960" rx="0" fill="#FAF9F6" stroke="#2D2D2D" stroke-width="3"/>

  <!-- Title -->
  <text x="270" y="48" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#1E2A3A" text-anchor="middle">Skill Shelf</text>
  <text x="270" y="76" font-family="system-ui,sans-serif" font-size="14" fill="#7A7A7A" text-anchor="middle" font-weight="500">用 6 个工具的开销，访问 500+ 个专业技能</text>

  <!-- Problem -->
  <rect x="24" y="100" width="492" height="148" rx="14" fill="#F2ECE4" stroke="#C4B8A8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="48" y="130" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#9A8870">问题</text>
  <text x="48" y="162" font-family="system-ui,sans-serif" font-size="14" fill="#3A3A3A">每个 skill 的 description 常驻上下文。</text>
  <text x="48" y="188" font-family="system-ui,sans-serif" font-size="14" fill="#3A3A3A">500 个 skill 就是数万 tokens 白白浪费，</text>
  <text x="48" y="214" font-family="system-ui,sans-serif" font-size="14" fill="#3A3A3A">每次对话都背着它们跑。</text>

  <!-- Arrow -->
  <line x1="270" y1="248" x2="270" y2="270" stroke="#B0A898" stroke-width="1.5"/>
  <polygon points="264,264 270,278 276,264" fill="#B0A898"/>

  <!-- Solution -->
  <rect x="24" y="286" width="492" height="136" rx="14" fill="#4A6A8A" stroke="#3A5A7A" stroke-width="2" filter="url(#sh)"/>
  <text x="48" y="316" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#FFF">方案</text>
  <text x="48" y="348" font-family="system-ui,sans-serif" font-size="15" fill="#FFF" font-weight="700">6 个工具常驻上下文。技能存磁盘，按需搜索加载。</text>
  <text x="48" y="380" font-family="system-ui,sans-serif" font-size="13" fill="#FFF" fill-opacity="0.65">不需要的专业能力，零开销。</text>

  <!-- Arrow -->
  <line x1="270" y1="422" x2="270" y2="444" stroke="#5A7A6A" stroke-width="1.5"/>
  <polygon points="264,438 270,452 276,438" fill="#5A7A6A"/>

  <!-- Design Philosophy -->
  <rect x="24" y="460" width="492" height="190" rx="14" fill="#5A7A6A" stroke="#4A6A5A" stroke-width="2" filter="url(#sh)"/>
  <text x="48" y="490" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#FFF">设计原则</text>

  <circle cx="58" cy="518" r="3" fill="#FFF" fill-opacity="0.4"/>
  <text x="76" y="523" font-family="system-ui,sans-serif" font-size="14" fill="#FFF">每个 skill 是 Markdown，不是可编程模块</text>

  <circle cx="58" cy="546" r="3" fill="#FFF" fill-opacity="0.4"/>
  <text x="76" y="551" font-family="system-ui,sans-serif" font-size="14" fill="#FFF">搜索只做一件事：确定性查找</text>

  <circle cx="58" cy="574" r="3" fill="#FFF" fill-opacity="0.4"/>
  <text x="76" y="579" font-family="system-ui,sans-serif" font-size="14" fill="#FFF">找到对的文档，读给 LLM 看，结束</text>

  <circle cx="58" cy="602" r="3" fill="#FFF" fill-opacity="0.4"/>
  <text x="76" y="607" font-family="system-ui,sans-serif" font-size="14" fill="#FFF">不做 skill 图谱、执行链、互相召唤</text>

  <circle cx="58" cy="630" r="3" fill="#FFF" fill-opacity="0.4"/>
  <text x="76" y="635" font-family="system-ui,sans-serif" font-size="14" fill="#FFF">分组是存储目录，不影响搜索范围</text>

  <!-- How it works: 2-step flow -->
  <rect x="24" y="670" width="236" height="108" rx="14" fill="#E8E4DD" stroke="#8A8578" stroke-width="1.5" filter="url(#shCard)"/>
  <text x="142" y="698" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#3A3A3A" text-anchor="middle">第一步：搜索</text>
  <text x="142" y="724" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" font-weight="700" fill="#4A6A8A" text-anchor="middle">search_skills</text>
  <text x="142" y="748" font-family="system-ui,sans-serif" font-size="11" fill="#8A8578" text-anchor="middle">全量扁平搜索，返回 Top N</text>
  <text x="142" y="766" font-family="system-ui,sans-serif" font-size="11" fill="#8A8578" text-anchor="middle">覆盖名称、描述、关键词、别名</text>

  <!-- Arrow between two flow cards -->
  <text x="270" y="728" font-family="system-ui,sans-serif" font-size="20" fill="#B0A898" text-anchor="middle">→</text>

  <rect x="280" y="670" width="236" height="108" rx="14" fill="#E8E4DD" stroke="#8A8578" stroke-width="1.5" filter="url(#shCard)"/>
  <text x="398" y="698" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#3A3A3A" text-anchor="middle">第二步：读取</text>
  <text x="398" y="724" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" font-weight="700" fill="#5A7A6A" text-anchor="middle">read_skill</text>
  <text x="398" y="748" font-family="system-ui,sans-serif" font-size="11" fill="#8A8578" text-anchor="middle">加载完整 SKILL.md</text>
  <text x="398" y="766" font-family="system-ui,sans-serif" font-size="11" fill="#8A8578" text-anchor="middle">附带参考文件，一次一个</text>

  <!-- 6 Tools compact listing -->
  <rect x="24" y="798" width="492" height="126" rx="14" fill="#3A3A3A" stroke="#2D2D2D" stroke-width="1.5" filter="url(#sh)"/>
  <text x="48" y="826" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FFF">6 个 MCP 工具</text>

  <text x="48" y="852" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#8AB4D4">search_skills</text>
  <text x="48" y="872" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#8AB4D4">read_skill</text>
  <text x="48" y="892" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#8AB4D4">validate_skills</text>
  <text x="48" y="912" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#8AB4D4">get_shelf_status</text>

  <text x="270" y="852" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#C8A882">install_skills</text>
  <text x="270" y="872" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#C8A882">manage_group</text>

  <text x="270" y="900" font-family="system-ui,sans-serif" font-size="10" fill="#6A6A6A">左侧 4 个只读 | 右侧 2 个写入</text>

  <!-- Watermark -->
  <text x="270" y="946" font-family="system-ui,sans-serif" font-size="11" fill="#C4C4C4" text-anchor="middle">Skill Shelf</text>
</svg>
