<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="540" height="960">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>

  <!-- Frame -->
  <rect width="540" height="960" rx="28" fill="#FFF8F0" stroke="#2D2D2D" stroke-width="4"/>

  <!-- Title -->
  <text x="270" y="48" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#1A1A2E" text-anchor="middle">📦 Skill Hub</text>
  <text x="270" y="76" font-family="system-ui,sans-serif" font-size="14" fill="#F97316" text-anchor="middle" font-weight="700">230+ Skill 的规格化路由框架</text>

  <!-- Pain point -->
  <rect x="24" y="100" width="492" height="76" rx="20" fill="#EF4444" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="270" y="130" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">💥 230+ skill 全量加载 = context 爆炸 · 找不到 · 格式乱</text>
  <text x="270" y="156" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.8" text-anchor="middle">传统做法：每个 skill 作为本地 skill → 数万 tokens 白白驻留</text>

  <!-- Arrow -->
  <line x1="270" y1="176" x2="270" y2="198" stroke="#2D2D2D" stroke-width="3"/>
  <polygon points="260,194 270,210 280,194" fill="#2D2D2D"/>

  <!-- Solution -->
  <rect x="24" y="214" width="492" height="120" rx="20" fill="#059669" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="270" y="244" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#FFF" text-anchor="middle">✅ 解决方案：Skill 规格化框架</text>

  <rect x="44" y="264" width="145" height="52" rx="14" fill="#FFF" fill-opacity="0.2"/>
  <text x="116" y="286" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#FFF" text-anchor="middle">📋 统一格式</text>
  <text x="116" y="304" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.8" text-anchor="middle">SKILL.md 规格</text>

  <rect x="200" y="264" width="145" height="52" rx="14" fill="#FFF" fill-opacity="0.2"/>
  <text x="272" y="286" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#FFF" text-anchor="middle">🗂️ 自动分类</text>
  <text x="272" y="304" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.8" text-anchor="middle">16 组加权匹配</text>

  <rect x="356" y="264" width="145" height="52" rx="14" fill="#FFF" fill-opacity="0.2"/>
  <text x="428" y="286" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#FFF" text-anchor="middle">🔍 路由查找</text>
  <text x="428" y="304" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.8" text-anchor="middle">三步渐进加载</text>

  <!-- Arrow -->
  <line x1="270" y1="334" x2="270" y2="356" stroke="#2D2D2D" stroke-width="3"/>
  <polygon points="260,352 270,368 280,352" fill="#2D2D2D"/>

  <!-- Architecture title -->
  <text x="270" y="392" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#1A1A2E" text-anchor="middle">架构总览</text>

  <!-- Layer 1: LLM (purple) -->
  <rect x="24" y="408" width="492" height="108" rx="20" fill="#7C3AED" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <circle cx="68" cy="440" r="20" fill="#FFF" fill-opacity="0.2"/>
  <text x="68" y="446" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle">🤖</text>
  <text x="100" y="440" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FFF">LLM 上下文</text>
  <text x="100" y="460" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.8">只有 9 个轻量工具定义</text>
  <rect x="100" y="476" width="80" height="22" rx="8" fill="#FFF" fill-opacity="0.2"/>
  <text x="140" y="491" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="600">9 个工具</text>
  <rect x="188" y="476" width="80" height="22" rx="8" fill="#FFF" fill-opacity="0.2"/>
  <text x="228" y="491" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="600">零开销</text>

  <!-- Arrow -->
  <line x1="270" y1="516" x2="270" y2="540" stroke="#2563EB" stroke-width="3"/>
  <polygon points="262,536 270,550 278,536" fill="#2563EB"/>
  <text x="286" y="538" font-family="system-ui,sans-serif" font-size="10" fill="#2563EB" font-weight="600">stdio</text>

  <!-- Layer 2: Service (blue) -->
  <rect x="24" y="554" width="492" height="108" rx="20" fill="#2563EB" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <circle cx="68" cy="586" r="20" fill="#FFF" fill-opacity="0.2"/>
  <text x="68" y="592" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle">⚡</text>
  <text x="100" y="586" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FFF">Skill Hub 服务</text>
  <text x="100" y="606" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.8">MCP Server · 路由 · 分类 · 索引 · 热重载</text>
  <rect x="100" y="620" width="52" height="22" rx="8" fill="#FFF" fill-opacity="0.2"/>
  <text x="126" y="635" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="600">路由</text>
  <rect x="160" y="620" width="52" height="22" rx="8" fill="#FFF" fill-opacity="0.2"/>
  <text x="186" y="635" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="600">分类</text>
  <rect x="220" y="620" width="52" height="22" rx="8" fill="#FFF" fill-opacity="0.2"/>
  <text x="246" y="635" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="600">索引</text>
  <rect x="280" y="620" width="52" height="22" rx="8" fill="#FFF" fill-opacity="0.2"/>
  <text x="306" y="635" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="600">监听</text>

  <!-- Arrow -->
  <line x1="270" y1="662" x2="270" y2="686" stroke="#059669" stroke-width="3"/>
  <polygon points="262,682 270,696 278,682" fill="#059669"/>

  <!-- Layer 3: Storage (green) -->
  <rect x="24" y="700" width="492" height="108" rx="20" fill="#059669" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <circle cx="68" cy="732" r="20" fill="#FFF" fill-opacity="0.2"/>
  <text x="68" y="738" font-family="system-ui,sans-serif" font-size="18" text-anchor="middle">💾</text>
  <text x="100" y="732" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FFF">本地存储</text>
  <text x="100" y="752" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.8">文件系统 · 持久化 · 版本管理</text>
  <rect x="100" y="768" width="130" height="28" rx="10" fill="#FFF" fill-opacity="0.2"/>
  <text x="165" y="786" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="700">📂 16 组目录</text>
  <rect x="240" y="768" width="130" height="28" rx="10" fill="#FFF" fill-opacity="0.2"/>
  <text x="305" y="786" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" text-anchor="middle" font-weight="700">📦 230+ 技能包</text>

  <!-- Bottom bar (orange) -->
  <rect x="24" y="836" width="492" height="48" rx="16" fill="#EA580C" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <text x="270" y="864" font-family="system-ui,sans-serif" font-size="13" fill="#FFF" text-anchor="middle" font-weight="700">🚀 230+ 只是起步 · install_skills 持续扩展</text>

  <!-- Watermark -->
  <text x="270" y="936" font-family="system-ui,sans-serif" font-size="11" fill="#C4C4C4" text-anchor="middle">Skill Hub</text>
</svg>