<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="540" height="960">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>

  <!-- Frame -->
  <rect width="540" height="960" rx="28" fill="#FAF9F6" stroke="#2D2D2D" stroke-width="4"/>

  <!-- Title -->
  <text x="270" y="48" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#1E2A3A" text-anchor="middle">🔍 路由协议</text>
  <text x="270" y="76" font-family="system-ui,sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">从 230+ skill 中精确找到你需要的那个</text>

  <!-- Step 1 (blue) -->
  <rect x="24" y="100" width="492" height="166" rx="20" fill="#3B6FA0" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <circle cx="56" cy="130" r="18" fill="#FFF" fill-opacity="0.25"/>
  <text x="56" y="136" font-family="system-ui,sans-serif" font-size="16" font-weight="900" fill="#3B6FA0" text-anchor="middle">1</text>
  <text x="86" y="126" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="15" font-weight="700" fill="#FFF">search_skills</text>
  <text x="86" y="144" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.85">关键词搜索</text>
  <text x="48" y="176" font-family="system-ui,sans-serif" font-size="13" fill="#FFF">按关键词搜索，匹配组描述与 skill 名称</text>
  <text x="48" y="198" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">返回匹配的组 + skill 名称列表</text>
  <rect x="48" y="216" width="200" height="22" rx="8" fill="#FFF" fill-opacity="0.25"/>
  <text x="56" y="231" font-family="system-ui,sans-serif" font-size="10" fill="#FFF">💡 没命中？走下方兜底路径</text>

  <!-- Arrow -->
  <line x1="270" y1="266" x2="270" y2="290" stroke="#2D2D2D" stroke-width="3"/>
  <polygon points="262,286 270,300 278,286" fill="#2D2D2D"/>

  <!-- Step 2 (green) -->
  <rect x="24" y="304" width="492" height="166" rx="20" fill="#2E8B6E" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <circle cx="56" cy="334" r="18" fill="#FFF" fill-opacity="0.25"/>
  <text x="56" y="340" font-family="system-ui,sans-serif" font-size="16" font-weight="900" fill="#2E8B6E" text-anchor="middle">2</text>
  <text x="86" y="330" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="15" font-weight="700" fill="#FFF">list_group_skills</text>
  <text x="86" y="348" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.85">浏览组内技能</text>
  <text x="48" y="380" font-family="system-ui,sans-serif" font-size="13" fill="#FFF">选定组后，列出组内所有 skill</text>
  <text x="48" y="402" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">返回 skill 名称、路径、描述摘要</text>
  <rect x="48" y="420" width="84" height="22" rx="8" fill="#FFF" fill-opacity="0.25"/>
  <text x="90" y="435" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="600">只返回元数据</text>
  <rect x="140" y="420" width="84" height="22" rx="8" fill="#FFF" fill-opacity="0.25"/>
  <text x="182" y="435" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="600">零正文开销</text>

  <!-- Arrow -->
  <line x1="270" y1="470" x2="270" y2="494" stroke="#2D2D2D" stroke-width="3"/>
  <polygon points="262,490 270,504 278,490" fill="#2D2D2D"/>

  <!-- Step 3 (purple) -->
  <rect x="24" y="508" width="492" height="166" rx="20" fill="#6B5B95" stroke="#2D2D2D" stroke-width="3" filter="url(#sh)"/>
  <circle cx="56" cy="538" r="18" fill="#FFF" fill-opacity="0.25"/>
  <text x="56" y="544" font-family="system-ui,sans-serif" font-size="16" font-weight="900" fill="#6B5B95" text-anchor="middle">3</text>
  <text x="86" y="534" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="15" font-weight="700" fill="#FFF">read_skill</text>
  <text x="86" y="552" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.85">按需加载正文</text>
  <text x="48" y="584" font-family="system-ui,sans-serif" font-size="13" fill="#FFF">加载完整 skill 正文与参考资料</text>
  <text x="48" y="606" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.9">一次只读一个，按需加载</text>
  <rect x="48" y="624" width="84" height="22" rx="8" fill="#FFF" fill-opacity="0.25"/>
  <text x="90" y="639" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="600">完整正文</text>
  <rect x="140" y="624" width="84" height="22" rx="8" fill="#FFF" fill-opacity="0.25"/>
  <text x="182" y="639" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="600">参考文件</text>

  <!-- Fallback -->
  <rect x="24" y="700" width="492" height="56" rx="18" fill="#E8D5A0" stroke="#2D2D2D" stroke-width="2.5" stroke-dasharray="8,5" filter="url(#sh)"/>
  <text x="48" y="724" font-family="system-ui,sans-serif" font-size="12" fill="#4A3520">🔄 兜底路径：search 没结果 →</text>
  <text x="48" y="744" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#1E2A3A" font-weight="600">list_skill_groups()</text>
  <text x="210" y="744" font-family="system-ui,sans-serif" font-size="12" fill="#4A3520">浏览全部组描述，由 LLM 选定</text>

  <!-- Search info -->
  <rect x="24" y="780" width="492" height="40" rx="14" fill="#6B5B95" stroke="#2D2D2D" stroke-width="2" filter="url(#sh)"/>
  <text x="270" y="804" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" text-anchor="middle">
    <tspan font-weight="700">纯 token 匹配</tspan>
    <tspan fill="#B8ADE0"> · </tspan>
    <tspan font-weight="700">中英双语</tspan>
    <tspan fill="#B8ADE0"> · </tspan>
    <tspan font-weight="700">语义判断交给 LLM</tspan>
  </text>

  <!-- Watermark -->
  <text x="270" y="936" font-family="system-ui,sans-serif" font-size="11" fill="#C4C4C4" text-anchor="middle">Skill Hub</text>
</svg>
