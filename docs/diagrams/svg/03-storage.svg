<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="640" height="1138">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.08"/></filter>
    <filter id="shCard"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <!-- Frame -->
  <rect width="640" height="1138" rx="0" fill="#FAF9F6" stroke="#2D2D2D" stroke-width="3.5"/>

  <!-- Title -->
  <text x="270" y="50" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#1E2A3A" text-anchor="middle">存储结构</text>
  <text x="270" y="78" font-family="system-ui,sans-serif" font-size="14" fill="#7A7A7A" text-anchor="middle" font-weight="600">文件系统布局：分组即目录，而非搜索标签</text>

  <!-- Directory tree card -->
  <rect x="24" y="104" width="492" height="310" rx="18" fill="#3A3A3A" stroke="#2D2D2D" stroke-width="2" filter="url(#sh)"/>
  <text x="48" y="134" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FFF">目录结构</text>

  <rect x="40" y="150" width="460" height="248" rx="12" fill="#2A2A2A"/>
  <text x="52" y="174" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#9A9A9A">data/hub/</text>
  <text x="52" y="196" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#D4D4D4">  config/</text>
  <text x="52" y="216" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#7A9A7A">    groups.json</text>
  <text x="200" y="216" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#6A6A6A">  # 17 个组定义</text>

  <text x="52" y="244" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#D4D4D4">  packages/</text>
  <text x="52" y="264" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#9A9A9A">    {group}/</text>
  <text x="200" y="264" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#6A6A6A">  # 如 engineering/, design/</text>
  <text x="52" y="284" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#9A9A9A">      {skill-id}/</text>
  <text x="52" y="304" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#7A9A7A">        SKILL.md</text>
  <text x="200" y="304" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#6A6A6A">  # 必需：技能正文</text>
  <text x="52" y="324" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#7A9A7A">        meta.json</text>
  <text x="200" y="324" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#6A6A6A">  # 自动生成的元数据</text>
  <text x="52" y="344" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#7A9A7A">        references/</text>
  <text x="200" y="344" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#6A6A6A">  # 可选：参考文档</text>
  <text x="52" y="364" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#7A9A7A">        scripts/</text>
  <text x="200" y="364" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#6A6A6A">  # 可选：辅助脚本</text>
  <text x="52" y="384" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#7A9A7A">        assets/</text>
  <text x="200" y="384" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="11" fill="#6A6A6A">  # 可选：媒体文件</text>

  <!-- SKILL.md format -->
  <rect x="24" y="434" width="492" height="200" rx="18" fill="#4A6A8A" stroke="#3A5A7A" stroke-width="2" filter="url(#sh)"/>
  <text x="48" y="464" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FFF">SKILL.md 格式</text>

  <rect x="40" y="480" width="460" height="80" rx="10" fill="#2A2A2A"/>
  <text x="52" y="500" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#7A9A7A">---</text>
  <text x="52" y="518" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12"><tspan fill="#8AB4D4">name</tspan><tspan fill="#D4D4D4">: </tspan><tspan fill="#C8A882">"技能名称"</tspan></text>
  <text x="52" y="536" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12"><tspan fill="#8AB4D4">description</tspan><tspan fill="#D4D4D4">: </tspan><tspan fill="#C8A882">"这个技能做什么"</tspan></text>
  <text x="52" y="554" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="12" fill="#7A9A7A">---</text>

  <text x="48" y="588" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.85">Frontmatter 可选 —— name 和 description 用于搜索索引</text>
  <text x="48" y="608" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.85">正文为 Markdown：指令、步骤、示例、约束</text>
  <text x="48" y="624" font-family="system-ui,sans-serif" font-size="11" fill="#FFF" fill-opacity="0.65">参考文件和资源目录在 read_skill 调用时加载</text>

  <!-- Key insight -->
  <rect x="24" y="654" width="492" height="120" rx="14" fill="#5A7A6A" stroke="#4A6A5A" stroke-width="1.5" filter="url(#shCard)"/>
  <text x="270" y="684" font-family="system-ui,sans-serif" font-size="13" fill="#FFF" text-anchor="middle" font-weight="700">分组 = 仅存储目录</text>

  <text x="48" y="712" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.85">分组将技能组织到磁盘目录中，</text>
  <text x="48" y="734" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.85">但不影响搜索行为。</text>
  <text x="48" y="756" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.85">search_skills 全量扁平搜索，不按分组过滤。</text>

  <!-- meta.json note -->
  <rect x="24" y="794" width="492" height="88" rx="14" fill="#7A6A5A" stroke="#6A5A4A" stroke-width="1.5" filter="url(#shCard)"/>
  <text x="270" y="822" font-family="system-ui,sans-serif" font-size="13" fill="#FFF" text-anchor="middle" font-weight="700">meta.json</text>
  <text x="270" y="844" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.85" text-anchor="middle">安装时自动生成，包含技能 ID、分组、文件哈希</text>
  <text x="270" y="866" font-family="system-ui,sans-serif" font-size="12" fill="#FFF" fill-opacity="0.85" text-anchor="middle">和参考文件列表。请勿手动编辑</text>

  <!-- Watermark -->
  <text x="270" y="936" font-family="system-ui,sans-serif" font-size="11" fill="#C4C4C4" text-anchor="middle">Skill Shelf</text>
</svg>
